{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontostand</title>
<link rel="stylesheet" href="{% static 'css/kontostand.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">
        Kontostand
    </div>

    <div class="logout">
        <a href="{% url 'logout' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">
    <div class="balance-box">
        {% if user %}
        <div class="label">Aktueller Kontostand von {{ user.user }}</div>
        <div class="balance">{{ balance|floatformat:2 }} €</div>
        {% else %}
        <div class="label">Kein Nutzer angemeldet</div>
        <div class="balance">Bitte zuerst über die Startseite einloggen.</div>
        {% endif %}
    </div>
</div>

<footer>
    <a class="back-button" href="{% url 'startseite' %}">
        Zurück zur Startseite
    </a>
</footer>

</body>
</html>
