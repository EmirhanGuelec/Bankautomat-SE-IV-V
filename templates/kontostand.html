{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontostand</title>
<link rel="stylesheet" href="{% static 'css/kontostand.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">
        Kontostand
    </div>

    <div class="logout">
        <a href="{% url 'ausgeloggt' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">
    <div class="balance-box">
        <div class="label">Aktueller Kontostand</div>
        <div class="balance">45,00 €</div>
    </div>
</div>

<footer>
    <a class="back-button" href="{% url 'home' %}">
        Zurück zur Startseite
    </a>
</footer>

</body>
</html>
