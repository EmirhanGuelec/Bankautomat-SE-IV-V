{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinTerminal</title>
<link rel="stylesheet" href="{% static 'css/ausgeloggt.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">
        Ausgeloggt
    </div>

</header>
<div class="mainy">
    {% if logged_in %}
        <div class="logged-in">
            Du bist bereits angemeldet. <a href="{% url 'home' %}">Zur Startseite</a>
        </div>
    {% else %}
        <div class="login-box">
            <div class="login-title">RFID Fallback-Login</div>
            <p>Gib hier deine RFID-ID ein, z.B. <strong>1</strong>.</p>
            <input id="rfid-uid" type="text" placeholder="RFID-ID eingeben" autocomplete="off">
            <button id="rfid-submit" class="button">Einloggen</button>
            <div id="rfid-error" class="error"></div>
        </div>
    {% endif %}
</div>

<script>
(function() {
    const submit = document.getElementById('rfid-submit');
    const uidInput = document.getElementById('rfid-uid');
    const error = document.getElementById('rfid-error');
    if (!submit) return;
    submit.addEventListener('click', async function() {
        const uid = uidInput.value.trim();
        error.textContent = '';
        if (!uid) {
            error.textContent = 'Bitte gib eine RFID-ID ein.';
            return;
        }
        const response = await fetch('{% url "rfid_login" %}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid })
        });
        const data = await response.json();
        if (!data.success) {
            error.textContent = data.error || 'Login fehlgeschlagen.';
            return;
        }
        window.location.href = '{% url "home" %}';
    });
})();
</script>
</body>
</html>
