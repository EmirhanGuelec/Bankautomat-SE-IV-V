{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geld abheben</title>
<link rel="stylesheet" href="{% static 'css/abheben.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">Geld abheben</div>

    <div class="logout">
        <a href="{% url 'logout' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">

    {% if fehler %}
    <div class="fehler">{{ fehler }}</div>
    {% endif %}

    <div id="message" class="message"></div>

    <form id="withdrawalForm" method="post" action="{% url 'abheben' %}">
        {% csrf_token %}
        <div>
            <div id="stepText" class="step-label">Betrag eingeben</div>
            <div id="amountDisplay" class="pin-display">0 €</div>
            <div id="pinDisplay" class="pin-display hidden">----</div>
        </div>

        <input type="hidden" name="betrag" id="betragInput" value="">
        <input type="hidden" name="pin" id="pinInput" value="">
    </form>

    <div class="numpad">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div class="key" onclick="clearInput()">←</div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="next()">OK</div>
    </div>

</div>

<footer>
    <a class="back-button" href="{% url 'startseite' %}">Zurück zur Startseite</a>
</footer>
</body>
</html>
