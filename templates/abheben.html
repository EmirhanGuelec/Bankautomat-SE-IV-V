{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geld abheben</title>
<link rel="stylesheet" href="{% static 'css/abheben.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">Geld abheben</div>

    <div class="logout">
        <a href="{% url 'logout' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">

    <div id="stepText" class="step">Betrag eingeben</div>

    <div id="amountDisplay" class="display">0 €</div>
    <div id="pinDisplay" class="display hidden">----</div>
    <div id="message" class="message"></div>

    <div class="numpad">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div class="key" onclick="clearInput()">←</div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="next()">OK</div>
    </div>

</div>

<footer>
    <a class="back-button" href="{% url 'home' %}">Zurück zur Startseite</a>
</footer>

<script>
let step = 0;
let amount = "";
let pin = "";

function update() {
    amountDisplay.textContent = (amount || 0) + " €";
    pinDisplay.textContent = "*".repeat(pin.length).padEnd(4, "-");
}

function press(n) {
    if (step === 0) {
        amount += n;
    } else {
        if (pin.length < 4) pin += n;
    }
    update();
}

function clearInput() {
    if (step === 0) {
        amount = amount.slice(0, -1);
    } else {
        pin = pin.slice(0, -1);
    }
    update();
}

async function submitWithdrawal() {
    const amountValue = parseFloat(amount.replace(',', '.') || '0');
    const pinValue = pin;
    if (!amountValue || amountValue <= 0) {
        message.textContent = 'Bitte einen gültigen Betrag eingeben.';
        message.className = 'message error';
        return;
    }
    if (pinValue.length !== 4) {
        message.textContent = 'PIN muss 4 Ziffern haben.';
        message.className = 'message error';
        return;
    }

    const response = await fetch('{% url "abheben_api" %}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ amount: amountValue, pin: pinValue })
    });

    const data = await response.json();
    if (!data.success) {
        message.textContent = data.error || 'Fehler beim Abheben.';
        message.className = 'message error';
        return;
    }

    message.textContent = 'Auszahlung erfolgreich. Neuer Kontostand: ' + data.balance.toFixed(2) + ' €';
    message.className = 'message success';
    amount = '';
    pin = '';
    step = 0;
    amountDisplay.classList.remove('hidden');
    pinDisplay.classList.add('hidden');
    stepText.textContent = 'Betrag eingeben';
    update();
}

function next() {
    if (step === 0) {
        if (!amount) {
            message.textContent = 'Bitte einen Betrag eingeben.';
            message.className = 'message error';
            return;
        }
        step = 1;
        stepText.textContent = 'PIN eingeben';
        amountDisplay.classList.add('hidden');
        pinDisplay.classList.remove('hidden');
        message.textContent = '';
    } else {
        submitWithdrawal();
    }
}

update();
</script>

</body>
</html>
