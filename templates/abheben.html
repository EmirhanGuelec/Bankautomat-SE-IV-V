{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geld abheben</title>
<link rel="stylesheet" href="{% static 'css/abheben.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">Geld abheben</div>

    <div class="logout">
        <a href="{% url 'logout' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">

    {% if fehler %}
    <div class="fehler">{{ fehler }}</div>
    {% endif %}

    <div id="message" class="message"></div>

    <form id="withdrawalForm" method="post" action="{% url 'abheben' %}">
        {% csrf_token %}
        <div>
            <div id="stepText" class="step-label">Betrag eingeben</div>
            <div id="amountDisplay" class="pin-display">0 €</div>
            <div id="pinDisplay" class="pin-display hidden">----</div>
        </div>

        <input type="hidden" name="betrag" id="betragInput" value="">
        <input type="hidden" name="pin" id="pinInput" value="">
    </form>

    <div class="numpad">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div class="key" onclick="clearInput()">←</div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="next()">OK</div>
    </div>

</div>

<footer>
    <a class="back-button" href="{% url 'home' %}">Zurück zur Startseite</a>
</footer>

<script>
    let step = 0;
    let amount = "";
    let pin = "";

    const messages = {
        amount: "Bitte Betrag eingeben.",
        pin: "PIN muss 4 Ziffern haben."
    };

    function update() {
        const stepText = document.getElementById("stepText");
        const amountDisplay = document.getElementById("amountDisplay");
        const pinDisplay = document.getElementById("pinDisplay");
        const message = document.getElementById("message");

        if (step === 0) {
            stepText.textContent = "Betrag eingeben";
            amountDisplay.classList.remove("hidden");
            pinDisplay.classList.add("hidden");
            amountDisplay.textContent = amount === "" ? "0 €" : amount + " €";
        } else {
            stepText.textContent = "PIN eingeben";
            amountDisplay.classList.add("hidden");
            pinDisplay.classList.remove("hidden");
            pinDisplay.textContent = pin.padEnd(4, "-");
        }

        if (!message.textContent) {
            message.classList.remove("error");
        }
    }

    function press(num) {
        if (step === 0) {
            amount += num;
        } else if (pin.length < 4) {
            pin += num;
        }
        update();
    }

    function clearInput() {
        if (step === 0) {
            amount = amount.slice(0, -1);
        } else {
            pin = pin.slice(0, -1);
        }
        update();
    }

    async function submitWithdrawal() {
        const message = document.getElementById("message");
        message.textContent = "";
        message.classList.remove("error");

        try {
            const response = await fetch('{% url "abheben_api" %}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ amount: amount, pin: pin })
            });

            const data = await response.json();
            if (!data.success) {
                message.textContent = data.error || 'Fehler beim Abheben.';
                message.classList.add("error");
                return;
            }

            message.textContent = 'Auszahlung erfolgreich. Neuer Kontostand: ' + data.balance.toFixed(2) + ' €';
            message.classList.remove("error");
            message.classList.add("success");
            amount = "";
            pin = "";
            step = 0;
            document.getElementById("betragInput").value = "";
            update();
        } catch (error) {
            message.textContent = 'Serverfehler. Bitte erneut versuchen.';
            message.classList.add("error");
        }
    }

    function next() {
        const message = document.getElementById("message");
        message.textContent = "";
        message.classList.remove("error");

        if (step === 0) {
            if (!amount) {
                message.textContent = messages.amount;
                message.classList.add("error");
                return;
            }
            step = 1;
        } else {
            if (pin.length < 4) {
                message.textContent = messages.pin;
                message.classList.add("error");
                return;
            }
            submitWithdrawal();
        }
        update();
    }

    update();
</script>

</body>
</html>
