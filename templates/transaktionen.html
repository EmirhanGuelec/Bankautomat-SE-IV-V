{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaktionen</title>
<link rel="stylesheet" href="{% static 'css/transaktionen.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">
        Transaktionen
    </div>

    <div class="logout">
        <a href="{% url 'logout' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">

    <div class="transactions">
    {% if transactions %}
        {% for tx in transactions %}
        <div class="transaction">
            <div>
                <div>{{ tx.description }}</div>
                <div class="meta">{{ tx.date }} • {{ tx.time }}</div>
            </div>
            <span class="amount">{{ tx.amount|floatformat:2 }} €</span>
        </div>
        {% endfor %}
    {% else %}
        <div class="transaction">
            <div>Keine Transaktionen vorhanden.</div>
        </div>
    {% endif %}
    </div>

</div>

<footer>
    <a class="back-button" href="{% url 'startseite' %}">
        Zurück zur Startseite
    </a>
</footer>

</body>
</html>
