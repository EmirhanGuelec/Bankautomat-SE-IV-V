{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIN ändern</title>
<link rel="stylesheet" href="{% static 'css/pin.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">PIN ändern</div>

    <div class="logout">
        <a href="{% url 'logout' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="content">

    <div>
        <div class="label">
            Bitte Neuen Pin eingeben
        </div>

        {% if error %}
        <div class="error">
        {{ error }}
        </div>
        {% endif %}

        <div id="display" class="pin-display">

        </div>
        
    </div>
     

    <div class="numpad">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div class="key" onclick="clearPin()">←</div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="next()">OK</div>
    </div>
    
</div>
    
<form method="POST" type="hidden"  action="{% url 'changepin' %}" id="pinform">
    <input name="Neuerpin" id="pinübergabe" type="hidden">
    {% csrf_token %}
</form>

<footer>
    <a class="back-button" href="{% url 'startseite' %}">Zurück zur Startseite</a>
</footer>

<script>
let pin = "";

function press(number) {

    pin += number;

    updateDisplay();
    
}

function clearPin() {

    pin = pin.slice(0, -1);

    updateDisplay(pin);
}

function updateDisplay() {

    document.getElementById("display").innerText = pin;
}
function next() {
    document.getElementById("pinübergabe").value=pin;
    document.getElementById("pinform").submit();
}

</script>

</body>
</html>
