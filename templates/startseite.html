{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinTerminal</title>
<link rel="stylesheet" href="{% static 'css/startseite.css' %}">
</head>

<body>

<header>
    <div class="left-header">
        <img src="{% static 'css/logo.png' %}" alt="Logo">
        <div class="title">
            <div class="main-title">CoinTerminal</div>
            <div class="sub-title">HVF Ludwigsburg</div>
        </div>
    </div>

    <div class="center-header">
        Startseite
    </div>

    <div class="logout">
        <a href="{% url 'ausgeloggt' %}"><img src="{% static 'css/logout.png' %}" alt="Logout" style="width: 80px; height: 80px; margin: 0; padding: 0;"></a>
    </div>
</header>

<div class="grid-container">
    <a class="button" href="{% url 'transaktionen' %}">
        Transaktionen
    </a>

    <a class="button" href="{% url 'kontostand' %}">
        Kontostand
    </a>

    <a class="button" href="{% url 'abheben' %}">
        Geld abheben
    </a>

    <a class="button" href="{% url 'pin' %}">
        PIN ändern
    </a>
</div>

</body>
</html>
